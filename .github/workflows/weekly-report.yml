name: Weekly GMB Report

on:
  schedule:
    - cron: '0 14 * * 1'  # Lunes 9am Miami (UTC-5 → 14:00 UTC)
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Send weekly reports
        run: |
          curl -f -X GET "${{ secrets.APP_URL }}/api/cron/send-reports" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 60
